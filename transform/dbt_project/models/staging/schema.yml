version: 2

models:
  - name: stg_players
    description: Player metadata from the NHL API
    columns:
      - name: player_id
        description: NHL player ID
        tests:
          - unique
          - not_null

  - name: stg_games
    description: Game metadata from the NHL schedule API
    columns:
      - name: game_id
        description: NHL game ID
        tests:
          - unique
          - not_null
      - name: game_date
        tests:
          - not_null

  - name: stg_play_by_play
    description: Shot events from the NHL public API
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [game_id, event_id]
    columns:
      - name: game_id
        tests:
          - not_null
      - name: event_id
        tests:
          - not_null
      - name: event_type
        tests:
          - accepted_values:
              values: ['goal', 'shot-on-goal', 'missed-shot', 'blocked-shot']

  - name: stg_player_stats
    description: Season-level skater stats from the NHL API
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [player_id, season]
    columns:
      - name: player_id
        tests:
          - not_null
      - name: season
        tests:
          - not_null
      - name: goals
        tests:
          - dbt_utils.expression_is_true:
              expression: ">= 0"
      - name: shooting_pct
        tests:
          - dbt_utils.expression_is_true:
              expression: "between 0 and 100"
              config:
                where: "shooting_pct is not null"

  - name: stg_moneypuck_shots
    description: Shot data from MoneyPuck with xG, rush, and rebound flags
    columns:
      - name: shooter_id
        tests:
          - not_null
      - name: x_goal
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "between 0 and 1"

version: 2

sources:
  - name: nhl
    description: Raw tables loaded by the extract scripts
    schema: main
    tables:
      - name: raw_play_by_play
        description: Shot events from the NHL public API, one row per shot attempt
      - name: raw_moneypuck_shots
        description: Shot data from MoneyPuck including xGoal, rush, and rebound flags
      - name: raw_players
        description: Player metadata fetched from the NHL API including name, position, headshot URL, and current team
      - name: raw_games
        description: Game metadata from the NHL schedule API including date, teams, scores, and outcome
      - name: raw_player_stats
        description: Season level skater stats from the NHL API including goals, assists, points, and TOI

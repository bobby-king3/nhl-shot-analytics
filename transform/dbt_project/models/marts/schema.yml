version: 2

models:
  - name: mart_shot_events
    description: Final shot events table with game context, xG, and video links
    columns:
      - name: event_id_pk
        description: Surrogate primary key
        tests:
          - unique
          - not_null
      - name: game_id
        tests:
          - not_null
      - name: shooter_id
        tests:
          - not_null
      - name: season
        tests:
          - not_null
      - name: game_date
        tests:
          - not_null
      - name: period
        tests:
          - dbt_utils.expression_is_true:
              expression: "between 1 and 5"
      - name: event_type
        tests:
          - accepted_values:
              values: ['goal', 'shot-on-goal', 'missed-shot', 'blocked-shot']
      - name: strength
        tests:
          - accepted_values:
              values: ['5v5', 'PP/SH', '4v4', '3v3', 'EN', 'other']
      - name: x_goal
        tests:
          - dbt_utils.expression_is_true:
              expression: "between 0 and 1"
              config:
                where: "x_goal is not null"

  - name: mart_player_shooting
    description: Season-level shooting stats and percentile ranks per player
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [shooter_id, season]
    columns:
      - name: shooter_id
        tests:
          - not_null
      - name: season
        tests:
          - not_null
      - name: sh_pct
        tests:
          - dbt_utils.expression_is_true:
              expression: "between 0 and 100"
              config:
                where: "sh_pct is not null"
      - name: goals_per_game_pctile
        tests:
          - dbt_utils.expression_is_true:
              expression: "between 0 and 1"
      - name: xg_per_game_pctile
        tests:
          - dbt_utils.expression_is_true:
              expression: "between 0 and 1"
      - name: sh_pct_pctile
        tests:
          - dbt_utils.expression_is_true:
              expression: "between 0 and 1"
      - name: avg_xg_per_shot_pctile
        tests:
          - dbt_utils.expression_is_true:
              expression: "between 0 and 1"
      - name: rebound_shot_pct_pctile
        tests:
          - dbt_utils.expression_is_true:
              expression: "between 0 and 1"
      - name: shot_distance_pctile
        tests:
          - dbt_utils.expression_is_true:
              expression: "between 0 and 1"
      - name: goals_above_expected_pctile
        tests:
          - dbt_utils.expression_is_true:
              expression: "between 0 and 1"

  - name: mart_team_season
    description: "Season level team stats: w/l record, goals/xG for and against, shooting %, save %"
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [season, team_abbrev]
    columns:
      - name: season
        tests:
          - not_null
      - name: team_abbrev
        tests:
          - not_null
      - name: games_played
        tests:
          - not_null
      - name: wins
        tests:
          - dbt_utils.expression_is_true:
              expression: ">= 0"
      - name: losses
        tests:
          - dbt_utils.expression_is_true:
              expression: ">= 0"
      - name: otl
        tests:
          - dbt_utils.expression_is_true:
              expression: ">= 0"

  - name: mart_team_games
    description: One row per team per game from each team's perspective (2 rows per game). Powers mart_team_season and the dashboard team game log.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [game_id, team_abbrev]
    columns:
      - name: season
        tests:
          - not_null
      - name: game_id
        tests:
          - not_null
      - name: game_date
        tests:
          - not_null
      - name: team_abbrev
        tests:
          - not_null
      - name: result
        tests:
          - accepted_values:
              values: ['W', 'L', 'OTL']

